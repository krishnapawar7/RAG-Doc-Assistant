version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_document_assistant
    ports:
      - "3000:3000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=sqlite:///data/assistant.db
    volumes:
      - ./data:/code/data
      - ./uploads:/code/uploads
    restart: unless-stopped
